<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            width: 340px;
            min-height: 420px;
            color: #eef7ff;
            background:
                radial-gradient(circle at 15% 18%, rgba(118, 176, 255, 0.22), transparent 26%),
                radial-gradient(circle at 85% 12%, rgba(147, 223, 255, 0.16), transparent 24%),
                linear-gradient(180deg, #09111d 0%, #0b1624 100%);
        }

        .shell {
            padding: 14px;
        }

        .panel {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(168, 214, 255, 0.16);
            background: rgba(10, 18, 30, 0.78);
            box-shadow:
                0 24px 50px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: -40% auto auto -20%;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(102, 177, 255, 0.24), transparent 68%);
            pointer-events: none;
        }

        .header {
            padding: 16px 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 1px solid rgba(168, 214, 255, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #62b8ff, #b18dff);
            color: #04101a;
            font-weight: 800;
        }

        .brand-copy {
            min-width: 0;
        }

        .brand-title {
            font-size: 14px;
            font-weight: 700;
            color: #f4fbff;
        }

        .brand-sub {
            font-size: 11px;
            color: rgba(220, 236, 255, 0.54);
        }

        .ghost-btn {
            border: 1px solid rgba(168, 214, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(234, 244, 255, 0.76);
            border-radius: 999px;
            padding: 8px 10px;
            font-size: 11px;
            cursor: pointer;
        }

        .section {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .screen-title {
            font-size: 20px;
            line-height: 1;
            letter-spacing: -0.04em;
            color: #f4fbff;
        }

        .screen-sub {
            font-size: 12px;
            color: rgba(220, 236, 255, 0.56);
            line-height: 1.55;
        }

        .field,
        .select,
        .preview {
            width: 100%;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(168, 214, 255, 0.1);
            color: #eef7ff;
        }

        .field,
        .select {
            padding: 12px 14px;
            font-size: 13px;
            outline: none;
        }

        .field:focus,
        .select:focus {
            border-color: rgba(139, 203, 255, 0.45);
            box-shadow: 0 0 0 3px rgba(108, 183, 255, 0.1);
        }

        .field::placeholder {
            color: rgba(220, 236, 255, 0.34);
        }

        .preview {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .preview-label {
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(160, 214, 255, 0.58);
        }

        .page-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.45;
            color: #f4fbff;
        }

        .url-preview {
            font-size: 11px;
            color: rgba(220, 236, 255, 0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 26px;
        }

        .tag {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(103, 181, 255, 0.1);
            color: #9ddaff;
            border: 1px solid rgba(131, 202, 255, 0.14);
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .btn-primary,
        .btn-secondary {
            flex: 1;
            border: none;
            border-radius: 16px;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #66b7ff, #b089ff);
            color: #04111b;
            box-shadow: 0 14px 28px rgba(95, 151, 255, 0.26);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #eef7ff;
            border: 1px solid rgba(168, 214, 255, 0.1);
        }

        .btn-primary:disabled,
        .btn-secondary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .error-msg,
        .success-card {
            border-radius: 14px;
            padding: 10px 12px;
            font-size: 12px;
        }

        .error-msg {
            background: rgba(75, 17, 27, 0.7);
            border: 1px solid rgba(255, 168, 168, 0.16);
            color: #ffc3c3;
        }

        .success-card {
            background: rgba(21, 65, 57, 0.62);
            border: 1px solid rgba(101, 232, 196, 0.18);
            color: #8df0d2;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="panel">
            <div class="header">
                <div class="brand">
                    <div class="brand-mark">N</div>
                    <div class="brand-copy">
                        <div class="brand-title">Nexus</div>
                        <div class="brand-sub">Save this page fast</div>
                    </div>
                </div>
                <button class="ghost-btn hidden" id="logout-btn">Logout</button>
            </div>

            <div class="section" id="login-screen">
                <div class="screen-title">Sign in</div>
                <div class="screen-sub">Connect the extension to your workspace.</div>
                <input class="field" type="email" id="email" placeholder="Email" />
                <input class="field" type="password" id="password" placeholder="Password" />
                <div class="error-msg hidden" id="login-error"></div>
                <button class="btn-primary" id="login-btn">Sign in</button>
            </div>

            <div class="section hidden" id="save-screen">
                <div class="preview">
                    <div class="preview-label">Current tab</div>
                    <div class="page-title" id="page-title">Loading...</div>
                    <div class="url-preview" id="url-preview"></div>
                </div>

                <select class="select" id="collection-select">
                    <option value="">No collection</option>
                </select>

                <div class="tags-row" id="tags-row"></div>
                <div class="error-msg hidden" id="save-error"></div>
                <div class="success-card hidden" id="success-card">Saved to Nexus</div>

                <div class="action-row">
                    <button class="btn-secondary" id="open-app-btn" type="button">Open app</button>
                    <button class="btn-primary" id="save-btn" type="button">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
